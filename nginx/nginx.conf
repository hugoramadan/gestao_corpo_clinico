# Redireciona HTTP → HTTPS
# Também expõe /.well-known/acme-challenge/ para o certbot (webroot)
server {
    listen 80;
    server_name _;

    # Desafio ACME para certbot (renovação de certificado)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # Certificados SSL — volume compartilhado com o container certbot
    # O caminho deve ser atualizado com o domínio real após rodar o certbot
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # Arquivos estáticos do Django
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploads de usuários (media)
    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    # API Django → gunicorn
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA — fallback para index.html
    location / {
        root  /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
