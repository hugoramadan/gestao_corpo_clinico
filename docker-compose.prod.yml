version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_HOST: db
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn core.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 2 \
          --worker-class sync \
          --timeout 120 \
          --access-logfile - \
          --error-logfile -

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    environment:
      - DOMAIN=cadastro.epaqc.com.br
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.corpoclinico.rule=Host(`cadastro.epaqc.com.br`)
      - traefik.http.routers.corpoclinico.entrypoints=websecure
      - traefik.http.routers.corpoclinico.tls.certresolver=letsencrypt
      - traefik.http.services.corpoclinico.loadbalancer.server.port=80
    networks:
      - default
      - traefik-proxy

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  traefik-proxy:
    external: true
